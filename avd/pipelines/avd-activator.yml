name: $(Date:yyyyMMdd)$(Rev:.r)-AVD-Hybrid-Activator

trigger: none

# SCHEDULE: Runs every 15 minutes
schedules:
- cron: "*/15 * * * *"
  displayName: "Hybrid Join Activator"
  branches:
    include:
    - main
  always: true

pool:
  vmImage: 'windows-latest'

variables:
  serviceConnection: '<YOURSERVICECONNECTION>'

steps:
- task: AzurePowerShell@5
  displayName: "Execute Activator Logic"
  inputs:
    azureSubscription: $(serviceConnection)
    ScriptType: 'FilePath'
    ScriptPath: '$(System.DefaultWorkingDirectory)/scripts/Invoke-HybridActivator.ps1'
    azurePowerShellVersion: 'LatestVersion'